Name: ms-tmdb-api
Host: 0.0.0.0
Port: 8888
# 允许保存较大的季明细 payload（默认 1MB）
MaxBytes: 8388608

# PostgreSQL 配置
Postgres:
  Host: "127.0.0.1"
  Port: 5432
  User: "postgres"
  Password: "postgres"
  DBName: "ms_tmdb"
  SSLMode: "disable"

# TMDB 配置
Tmdb:
  ApiKey: "your_tmdb_api_key"
  BaseURL: "https://api.tmdb.org/3"
  DefaultLanguage: "zh-CN"
  RateLimit: 40
  ProxyURL: ""
  LocalWriteEnabled: true
  AutoSync:
    Enabled: true
    CronExpr: "*/30 * * * *"
    Mode: "update_unmodified"
    BatchSize: 50
    StartDelaySecond: 15
